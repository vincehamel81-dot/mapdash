<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 160" role="img" aria-label="Tan plush dog marker">
<defs>
  <linearGradient id="f" x1="0" y1="0" x2="0" y2="1">
    <stop stop-color="#f5cf87"/>
    <stop offset="1" stop-color="#d99f4e"/>
  </linearGradient>
  <linearGradient id="e" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#ef9bab"/>
    <stop offset="1" stop-color="#c85c79"/>
  </linearGradient>
</defs>

<!-- ears -->
<path d="M30 43 23 8Q22 2 28 5l23 22Z" fill="url(#f)" stroke="#b97934" stroke-width="2"/>
<path d="M98 43 105 8q1-6-5-3L77 27Z" fill="url(#f)" stroke="#b97934" stroke-width="2"/>
<path d="m31 32-4-20 17 15Z" fill="url(#e)"/>
<path d="m97 32 4-20-17 15Z" fill="url(#e)"/>

<!-- head -->
<ellipse cx="64" cy="61" rx="47" ry="42" fill="url(#f)" stroke="#b97934" stroke-width="2"/>

<!-- eyes -->
<ellipse cx="43" cy="58" rx="16" ry="18" fill="#8a4b9f"/>
<ellipse cx="85" cy="58" rx="16" ry="18" fill="#8a4b9f"/>
<ellipse cx="43" cy="59" rx="11" ry="14" fill="#080808"/>
<ellipse cx="85" cy="59" rx="11" ry="14" fill="#080808"/>
<circle cx="38" cy="52" r="4" fill="#fff"/>
<circle cx="80" cy="52" r="4" fill="#fff"/>
<circle cx="47" cy="64" r="2" fill="#fff" opacity=".65"/>
<circle cx="89" cy="64" r="2" fill="#fff" opacity=".65"/>

<!-- muzzle -->
<ellipse cx="64" cy="76" rx="20" ry="15" fill="#ead1a9"/>
<path d="M57 71q7-7 14 0-1 7-7 7t-7-7" fill="#171717"/>
<path d="M64 78v6m0 0q-7 7-12 0m12 0q7 7 12 0" fill="none" stroke="#171717" stroke-width="2" stroke-linecap="round"/>

<!-- body -->
<ellipse cx="64" cy="119" rx="27" ry="34" fill="url(#f)" stroke="#b97934" stroke-width="2"/>
<path d="M52 94q12 8 24 0l6 31q-2 20-18 22-16-2-18-22Z" fill="#f8f5ef"/>

<!-- arms -->
<ellipse cx="38" cy="120" rx="11" ry="25" transform="rotate(18 38 120)" fill="url(#f)" stroke="#b97934" stroke-width="2"/>
<ellipse cx="90" cy="120" rx="11" ry="25" transform="rotate(-18 90 120)" fill="url(#f)" stroke="#b97934" stroke-width="2"/>

<!-- feet -->
<ellipse cx="48" cy="145" rx="18" ry="10" fill="#d99f4e" stroke="#b97934" stroke-width="2"/>
<ellipse cx="80" cy="145" rx="18" ry="10" fill="#d99f4e" stroke="#b97934" stroke-width="2"/>
</svg>
